name: BTC Forward-Test Bot

# ── Scheduling ────────────────────────────────────────────────────────────
# GitHub's native `schedule:` trigger is documented as best-effort and, in
# practice, high-frequency schedules (every 5-10 min) are frequently DELAYED
# BY HOURS or dropped entirely on free/personal-tier repos — this is a real,
# widely-reported GitHub Actions limitation, not a bug in this workflow.
#
# The RELIABLE trigger for this bot is now an EXTERNAL cron service
# (cron-job.org — free, no card, supports down to 1-minute intervals) that
# calls GitHub's REST API to fire `workflow_dispatch` on a real schedule.
# See the repo README / setup instructions for how to configure this.
#
# GitHub's own `schedule:` below is kept ONLY as a coarse safety net in case
# the external trigger service is ever down or misconfigured — it is not
# the primary mechanism and its timing should not be relied upon.
on:
  schedule:
    - cron: "0 * * * *"      # hourly backup net only — NOT the primary trigger
  workflow_dispatch: {}       # the real trigger: called by cron-job.org, or manually
                               # from the Actions tab

# ── Prevent overlapping runs ─────────────────────────────────────────────
# If one run ever takes longer than the schedule interval (e.g. a daily
# retrain that runs slow), this queues the next run instead of letting two
# runs write state.json / push commits concurrently.
concurrency:
  group: btc-bot-runner
  cancel-in-progress: false

# Needed so the built-in GITHUB_TOKEN can push state/log commits back to
# this same repo.
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # safety net in case a step ever hangs

    steps:
      - name: Checkout repo (with previous state)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one bot check (daily entry gate + monitor tick)
        run: python run_once.py

      - name: Commit and push updated state/logs
        run: |
          git config user.name "btc-bot[actions]"
          git config user.email "actions@users.noreply.github.com"
          git add shadow_state.json shadow_trade_log.json \
                   shadow_equity_log.csv shadow_monitor_log.csv \
                   2>/dev/null || true
          git commit -m "Bot state update $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            || echo "No state changes to commit this run."
          git push || echo "Nothing to push."
